# 1. K3s 마스터 설치
- name: K3s 마스터 노드 설치
  shell: |
    curl -sfL https://get.k3s.io | sh -s - server \
    --write-kubeconfig-mode 644 \
    --tls-san {{ ansible_host }}
  args:
    creates: /usr/local/bin/k3s

# 2. API 서버 준비 대기 (매우 중요)
- name: K3s API 서버 대기
  wait_for:
    port: 6443
    delay: 10

# 3. 토큰 가져오기 및 공유
- name: K3s 서버 토큰 읽기
  command: cat /var/lib/rancher/k3s/server/node-token
  register: k3s_token
  changed_when: false

- name: 토큰 공유
  set_fact:
    shared_k3s_token: "{{ k3s_token.stdout }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  with_items: "{{ groups['all'] }}"

# 4. Helm 설치
- name: Helm 설치 스크립트 실행
  shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

# 5. Cluster Autoscaler 배포
- name: Cluster Autoscaler 배포
  kubernetes.core.helm:
    name: cluster-autoscaler
    chart_ref: autoscaler/cluster-autoscaler
    release_namespace: kube-system
    create_namespace: yes
    # K3s의 설정 파일을 참조하도록 명시
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    values:
      autoDiscovery:
        clusterName: "8team-cluster"
      awsRegion: "ap-northeast-2"
      rbac:
        create: true
      extraArgs:
        v: 4
        cloud-provider: aws
        expander: least-waste