---
- name: K3s 워커 노드 설치 및 역할별 테인트 부여
  shell: |
    # 호스트 이름에 'op'가 있으면 운영자용 테인트 부여, 아니면 사용자용 테인트 부여
    ROLE_TYPE=$([[ "{{ inventory_hostname }}" =~ "op" ]] && echo "operator" || echo "user")
    
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ nlb_dns }}:6443 \
    K3S_TOKEN="{{ vault_k3s_shared_token }}" sh -s - agent \
    --node-taint nodetype=${ROLE_TYPE}:NoSchedule
  args:
    creates: /usr/local/bin/k3s