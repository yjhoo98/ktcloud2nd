# 1. 마스터의 프라이빗 IP 주소 가져오기 (인벤토리 기반)
- name: 마스터 IP 설정
  set_fact:
    master_ip: "{{ hostvars[groups['masters'][0]]['ansible_host'] }}"

# 2. 마스터 정보를 가지고 K3s 에이전트 설치 및 조인
- name: K3s 워커 노드 설치 및 클러스터 조인
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ master_ip }}:6443 \
    K3S_TOKEN={{ shared_token }} sh -
  args:
    creates: /usr/local/bin/k3s