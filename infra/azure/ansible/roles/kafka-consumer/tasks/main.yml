# AWS RDS 주소(Endpoint)를 실시간으로 조회
- name: AWS RDS 정보 가져오기 (동적 주소 조회)
  amazon.aws.rds_instance_info:
    db_instance_identifier: "ktcloud2nd-postgres"
    region: "{{ aws_region }}"  # Ansible Playbook에서 넘겨준 변수 사용
  delegate_to: localhost # 조희는 GitHub Runner(로컬)에서 수행
  register: rds_info

# 조회된 주소와 SSM의 비밀번호를 변수로 할당
- name: 엔드포인트 및 비밀번호 변수 설정
  set_fact:
    rds_endpoint: "{{ rds_info.instances[0].endpoint.address }}"
    db_password: "{{ lookup('amazon.aws.aws_ssm', '/config/vehicle/db_password', region='ap-northeast-2') }}"

- name: Consumer 작업용 루트(앱) 디렉토리 생성
  file:
    path: "/home/{{ ansible_user }}/consumer-app/app"
    state: directory
    mode: '0755'

- name: Python 정제기 코드 및 의존성 파일 복사
  copy:
    src: "{{ item }}"
    dest: "/home/{{ ansible_user }}/consumer-app/app/{{ item }}"
  loop:
    - processor.py
    - requirements.txt

- name: "Docker Compose 파일 배포"
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ ansible_user }}/consumer-app/docker-compose.yml"

- name: "최신 이미지 풀(Pull) 받기"
  shell:
    # 빌드 서버(GitHub Actions)가 올려둔 이미지를 내려받음
    cmd: "docker compose pull"
    chdir: "/home/{{ ansible_user }}/consumer-app"
  become: yes

- name: "컨테이너 실행"
  shell:
    # 이미지가 이미 있으므로 빌드 없이 바로 실행
    cmd: "docker compose up -d"
    chdir: "/home/{{ ansible_user }}/consumer-app"
  become: yes

- name: Kafka Connect 서비스 안정화 대기
  pause:
    seconds: 30
    prompt: "Consumer 앱과 Connector가 완전히 뜰 때까지 기다립니다."

# 원본 저장용
- name: "Azure Data Lake (ADLS Gen2) Sink 커넥터 설정 (Raw Data)"
  uri:
    url: "http://localhost:8083/connectors"
    method: POST
    body_format: json
    body:
      name: "azure-datalake-raw-sink"
      config:
        # Azure Data Lake Gen2는 기본적으로 Blob Storage의 뼈대 위에 폴더 기능을 얹은 것이기 때문에, 통신할 때는 기존의 Blob API 클래스를 그대로 사용해서 통신
        connector.class: "io.aiven.kafka.connect.azure.sink.AzureBlobSinkConnector"
        tasks.max: "1"
        topics: "raw_topic"
        key.converter: "org.apache.kafka.connect.json.JsonConverter"
        key.converter.schemas.enable: "false" 
        value.converter: "org.apache.kafka.connect.json.JsonConverter"
        value.converter.schemas.enable: "true"
        azure.storage.connection.string: "DefaultEndpointsProtocol=https;AccountName={{ azure_storage_account_name }};AccountKey={{ azure_storage_primary_key }};EndpointSuffix=core.windows.net"
        azure.storage.container.name: "raw-topic-container"
        format.output.fields: "value"
        format.output.type: "json"
        flush.size: "100" # 파티션이 3개이기 때문에 메시지가 약 300개가 날아와야 파일이 생성됨
        rotate.interval.ms: "60000"  # 1분마다 강제 저장
        
        # Data Lake의 폴더 기능 활용
        file.name.template: !unsafe "{{topic}}/{{timestamp:unit=yyyy}}/{{timestamp:unit=MM}}/{{timestamp:unit=dd}}/{{partition}}-{{start_offset}}.json"
        timestamp.extractor: "Wallclock" # 현재 시간을 기준으로 폴더 생성
    status_code: [201, 409]
  register: connect_result
  until: "connect_result.status is defined and (connect_result.status == 201 or connect_result.status == 409)"
  retries: 20
  delay: 15

# 정제 데이터용
- name: "AWS RDS JDBC Sink 커넥터 설정 (Cleansed Data)"
  uri:
    url: "http://localhost:8083/connectors"
    method: POST
    body_format: json
    body:
      name: "aws-rds-jdbc-sink"
      config:
        connector.class: "io.confluent.connect.jdbc.JdbcSinkConnector"
        topics: "cleansed_topic"
        connection.url: "jdbc:postgresql://{{ rds_endpoint }}:5432/{{ db_name }}"
        connection.user: "{{ db_user }}"
        connection.password: "{{ db_password }}"
        table.name.format: "vehicle_stats"
        insert.mode: "insert"
        auto.create: "false"
        value.converter: "org.apache.kafka.connect.json.JsonConverter"
        value.converter.schemas.enable: "true"
        key.converter: "org.apache.kafka.connect.json.JsonConverter" # 추가
        key.converter.schemas.enable: "false"
        batch.size: "1" # 3개의 파티션이니까 약 150개의 데이터가 보내져야 확인 가능 (오버헤드 예방, 실시간성 1~2초 지연)
        #linger.ms: "2000" # 2초마다 강제 INSERT (사용자는 거의 실시간으로 느낌)
    status_code: [201, 409]
  register: rds_stats_result
  until: "rds_stats_result.status is defined and (rds_stats_result.status == 201 or rds_stats_result.status == 409)"
  retries: 20
  delay: 15

# 이상 탐지용
- name: "AWS RDS JDBC Sink 커넥터 설정 (Anomaly Alerts)"
  uri:
    url: "http://localhost:8083/connectors"
    method: POST
    body_format: json
    body:
      name: "aws-rds-anomaly-sink"
      config:
        connector.class: "io.confluent.connect.jdbc.JdbcSinkConnector"
        topics: "anomaly_topic"
        connection.url: "jdbc:postgresql://{{ rds_endpoint }}:5432/{{ db_name }}"
        connection.user: "{{ db_user }}"
        connection.password: "{{ db_password }}"
        table.name.format: "vehicle_anomaly_alerts"
        insert.mode: "insert"
        auto.create: "false"
        value.converter: "org.apache.kafka.connect.json.JsonConverter"
        value.converter.schemas.enable: "true"
        key.converter: "org.apache.kafka.connect.json.JsonConverter" # 추가
        key.converter.schemas.enable: "false"
        batch.size: "1" # 이상 탐지는 즉시 확인해야하므로 1개씩 데이터 전송
    status_code: [201, 409]
  register: rds_anomaly_result
  until: "rds_anomaly_result.status is defined and (rds_anomaly_result.status == 201 or rds_anomaly_result.status == 409)"
  retries: 20
  delay: 15

