---
- name: "VM DNS 설정 강제 업데이트 (8.8.8.8)"
  shell: |
    echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
  become: yes

- name: Consumer 작업용 루트(앱) 디렉토리 생성
  file:
    path: "/home/{{ ansible_user }}/consumer-app/app"
    state: directory
    mode: '0755'

- name: Python 정제기 코드 및 의존성 파일 복사
  copy:
    src: "{{ item }}"
    dest: "/home/{{ ansible_user }}/consumer-app/app/{{ item }}"
  loop:
    - processor.py
    - requirements.txt
  ignore_errors: yes

- name: Dockerfile 및 Docker Compose 템플릿 배포
  template:
    src: "{{ item.src }}"
    dest: "/home/{{ ansible_user }}/consumer-app/{{ item.dest }}"
  loop:
    - { src: 'Dockerfile.j2', dest: 'Dockerfile' }
    - { src: 'docker-compose.yml.j2', dest: 'docker-compose.yml' }

- name: "커스텀 이미지 빌드 (BuildKit 네트워크 호스트 강제)"
  shell:
    # cmd와 chdir을 분리
    cmd: "docker compose build --no-cache --pull"
    chdir: "/home/{{ ansible_user }}/consumer-app"
  become: yes
  environment:
    # 이 설정이 있어야 빌드 프로세스가 VM의 8.8.8.8 DNS를 인식
    DOCKER_BUILDKIT: "1"
    BUILDKIT_STEP_LOG_MAX_SIZE: "10000000"

- name: "컨테이너 실행"
  shell:
    cmd: "docker compose up -d"
    chdir: "/home/{{ ansible_user }}/consumer-app"
  become: yes

- name: Kafka Connect 서비스 안정화 대기
  pause:
    seconds: 60
    prompt: "Consumer 앱과 Connector가 완전히 뜰 때까지 기다립니다."

- name: "Azure Blob Storage Sink 커넥터 설정 (Raw Data)"
  uri:
    url: "http://localhost:8083/connectors"
    method: POST
    body_format: json
    body:
      name: "azure-blob-raw-sink"
      config:
        connector.class: "io.confluent.connect.azure.blob.AzureBlobStorageSinkConnector"
        tasks.max: "1"
        topics: "raw_topic"
        key.converter: "org.apache.kafka.connect.storage.StringConverter"
        value.converter: "org.apache.kafka.connect.json.JsonConverter"
        value.converter.schemas.enable: "false"
        # Broker 주소 추가
        confluent.topic.bootstrap.servers: "{{ broker_internal_ip }}:9094,{{ broker_internal_ip }}:9095,{{ broker_internal_ip }}:9096"
        # Azure 스토리지 정보 (Terraform Output에서 넘어온 변수 활용)
        azblob.account.name: "{{ azure_storage_account_name }}"
        azblob.account.key: "{{ azure_storage_primary_key }}"
        azblob.container.name: "raw-topic-container"
        format.class: "io.confluent.connect.azure.blob.format.avro.AvroFormat" # 원본 보존용 Avro
        flush.size: "100"
    status_code: [201, 409] # 409는 이미 존재할 경우 무시
  register: connect_result
  # 연결 실패나 500 에러가 나더라도 성공할 때까지 반복
  until: "connect_result.status is defined and (connect_result.status == 201 or connect_result.status == 409)"
  retries: 20 # 최대 20번 시도
  delay: 15   # 15초 간격으로 (총 5분 동안 대기하며 확인)

- name: "AWS S3 Sink 커넥터 설정 (Cleansed Data)"
  uri:
    url: "http://localhost:8083/connectors"
    method: POST
    body_format: json
    body:
      name: "aws-s3-cleansed-sink"
      config:
        connector.class: "io.confluent.connect.s3.S3SinkConnector"
        tasks.max: "1"
        topics: "cleansed_topic"
        key.converter: "org.apache.kafka.connect.storage.StringConverter"
        value.converter: "org.apache.kafka.connect.json.JsonConverter"
        value.converter.schemas.enable: "false"
        # Broker 주소 추가
        confluent.topic.bootstrap.servers: "{{ broker_internal_ip }}:9094,{{ broker_internal_ip }}:9095,{{ broker_internal_ip }}:9096"
        s3.bucket.name: "{{ s3_bucket_name }}"
        s3.region: "ap-northeast-2"
        # AWS 인증 정보 (Github Secrets에서 넘어온 변수 활용)
        aws.access.key.id: "{{ aws_access_key }}"
        aws.secret.access.key: "{{ aws_secret_key }}"
        format.class: "io.confluent.connect.s3.format.json.JsonFormat" # 분석용 JSONL
        line.separator: "\n"
        storage.class: "io.confluent.connect.s3.storage.S3Storage"
        flush.size: "100"
    status_code: [201, 409]