---
- name: Configure K3s masters
  hosts: masters
  serial: 1
  become: yes
  vars_files:
    - ../vault/vault.yml
  vars:
    db_password: "{{ lookup('aws_ssm', '/config/vehicle/db_password', decrypt=True, region='ap-northeast-2') }}"
  roles:
    - role: k3s_master
      vars:
        db_endpoint: "{{ db_endpoint | default('db.vehicle.internal', true) }}"
        db_username: "{{ db_username | default('dbadmin', true) }}"
        db_name: "{{ db_name | default('vehicle_db', true) }}"
        db_port: "{{ db_port | default(5432, true) | int }}"

- name: Initialize database schema from master node
  hosts: masters[0]
  become: yes
  gather_facts: yes
  vars:
    db_password: "{{ lookup('aws_ssm', '/config/vehicle/db_password', decrypt=True, region='ap-northeast-2') }}"
  tasks:
    - name: Install PostgreSQL Python driver
      apt:
        name: python3-psycopg2
        state: present
        update_cache: yes

    - name: Apply web platform database schema
      include_role:
        name: db_setup
      vars:
        ansible_python_interpreter: /usr/bin/python3
        db_password: "{{ db_password }}"
        db_endpoint: "{{ db_endpoint | default('db.vehicle.internal', true) }}"
        db_username: "{{ db_username | default('dbadmin', true) }}"
        db_name: "{{ db_name | default('vehicle_db', true) }}"
        db_port: "{{ db_port | default(5432, true) | int }}"

- name: Install Linkerd
  hosts: masters
  become: yes
  roles:
    - linkerd

- name: Install Cluster Autoscaler
  hosts: masters
  become: yes
  roles:
    - cluster-autoscaler

- name: Install AWS Cloud Controller Manager
  hosts: masters
  become: yes
  serial: 1
  roles:
    - aws-ccm

- name: Install Prometheus and Grafana
  hosts: masters
  become: yes
  vars_files:
    - ../vault/vault.yml
  roles:
    - prometheus

- name: Provision web-platform backend env and secrets
  hosts: masters
  become: yes
  vars:
    db_password: "{{ lookup('aws_ssm', '/config/vehicle/db_password', decrypt=True, region='ap-northeast-2') }}"
  roles:
    - role: web_platform_env
      vars:
        db_endpoint: "{{ db_endpoint | default('db.vehicle.internal', true) }}"
        db_username: "{{ db_username | default('dbadmin', true) }}"
        db_name: "{{ db_name | default('vehicle_db', true) }}"
        db_port: "{{ db_port | default(5432, true) | int }}"

- name: Install ArgoCD applications
  hosts: masters
  become: yes
  roles:
    - argocd
