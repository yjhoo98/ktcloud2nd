---
- name: Install K3s master with external PostgreSQL datastore
  shell: |
    curl -sfL https://get.k3s.io | \
      K3S_DATASTORE_ENDPOINT="postgres://{{ db_username }}:{{ db_password }}@{{ db_endpoint }}:{{ db_port }}/{{ db_name }}" \
      K3S_TOKEN="{{ vault_k3s_shared_token }}" \
      sh -s - server \
      --tls-san {{ nlb_dns }}
  args:
    creates: /usr/local/bin/k3s

- name: Wait for K3s kubeconfig to be ready
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 120

- name: Ensure K3s service is enabled and running
  systemd:
    name: k3s
    state: started
    enabled: yes

- name: Helm CLI 설치 스크립트 다운로드
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm.sh
    mode: '0755'
  run_once: true

- name: Helm CLI 설치
  command: /tmp/get-helm.sh
  args:
    creates: /usr/local/bin/helm
  run_once: true

# valuesContent 아래에 experimental.plugins 추가 (Coraza)
# Traefik은 plugin을 정적 설정에서 먼저 알아야 함 (나중에 MIddleware에서 plugin: coraza를 알아볼 수 있게)
- name: Traefik DaemonSet + hostPort + ping 설정 (ALB 헬스체크 및 워커 노드 taint 대응)
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: helm.cattle.io/v1
    kind: HelmChartConfig
    metadata:
      name: traefik
      namespace: kube-system
    spec:
      valuesContent: |-
        experimental:
          plugins:
            coraza:
              moduleName: github.com/jcchavezs/coraza-http-wasm-traefik
              version: v0.3.0
        ping:
          entryPoint: "web"
        deployment:
          kind: DaemonSet
        tolerations:
          - key: "nodetype"
            operator: "Exists"
            effect: "NoSchedule"
        service:
          type: ClusterIP
        ports:
          web:
            hostPort: 80
          websecure:
            hostPort: 443
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Traefik DaemonSet 생성 대기 (HelmChartConfig 반영 시간 확보)
  command: kubectl get daemonset traefik -n kube-system
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  register: traefik_ds_check
  retries: 12
  delay: 15
  until: traefik_ds_check.rc == 0

- name: Traefik DaemonSet 롤아웃 대기
  command: kubectl rollout status daemonset/traefik -n kube-system --timeout=120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: CoreDNS HA 설정 (replica 2개, AZ 분산)
  shell: |
    kubectl patch deployment coredns -n kube-system --type merge -p '{
      "spec": {
        "replicas": 2,
        "template": {
          "spec": {
            "topologySpreadConstraints": [
              {
                "maxSkew": 1,
                "topologyKey": "topology.kubernetes.io/zone",
                "whenUnsatisfiable": "DoNotSchedule",
                "labelSelector": {
                  "matchLabels": {
                    "k8s-app": "kube-dns"
                  }
                }
              }
            ]
          }
        }
      }
    }'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: autoscaler Helm repo 추가
  command: helm repo add autoscaler https://kubernetes.github.io/autoscaler --force-update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Helm repo 업데이트
  command: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
