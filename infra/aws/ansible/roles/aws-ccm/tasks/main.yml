---
- name: Ensure K3s disables the in-tree cloud controller
  lineinfile:
    path: /etc/rancher/k3s/config.yaml
    line: "disable-cloud-controller: true"
    create: yes
  register: k3s_config_changed

- name: Restart K3s when config changes
  systemd:
    name: k3s
    state: restarted
  when: k3s_config_changed.changed

- name: Wait for K3s API after restart
  command: kubectl get nodes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  retries: 12
  delay: 10
  until: result.rc == 0
  register: result
  failed_when: false
  when: k3s_config_changed.changed

- name: Add AWS CCM Helm repo
  command: helm repo add aws-cloud-controller-manager https://kubernetes.github.io/cloud-provider-aws --force-update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Update Helm repo cache
  command: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Upload AWS CCM values
  copy:
    src: aws-ccm-values.yaml
    dest: /tmp/aws-ccm-values.yaml

- name: Install AWS CCM
  command: >
    helm upgrade --install aws-cloud-controller-manager
    aws-cloud-controller-manager/aws-cloud-controller-manager
    --namespace kube-system
    --values /tmp/aws-ccm-values.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Wait for AWS CCM rollout
  command: kubectl rollout status daemonset/aws-cloud-controller-manager -n kube-system --timeout=180s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  register: aws_ccm_rollout_status
  failed_when: false
  changed_when: false

- name: Warn when AWS CCM rollout is delayed
  debug:
    msg: "AWS CCM rollout did not finish within the timeout. Continuing with the remaining steps."
  when: aws_ccm_rollout_status.rc != 0
  run_once: true
