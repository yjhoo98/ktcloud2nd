---
- name: Resolve ArgoCD repository URL
  set_fact:
    argocd_repo_url_resolved: "{{ argocd_repo_url | default('https://github.com/ktcloud2nd/ktcloud2nd.git', true) }}"
  run_once: true

- name: ArgoCD Helm repo 추가
  command: helm repo add argo https://argoproj.github.io/argo-helm --force-update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Helm repo 업데이트
  command: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: ArgoCD 릴리즈 상태 확인
  shell: >
    helm status argocd --namespace argocd --output json 2>/dev/null
    | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])"
    2>/dev/null || echo "not-found"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  register: argocd_release_status
  failed_when: false
  changed_when: false

- name: 실패한 ArgoCD 릴리즈 제거 (재설치 위해)
  command: helm uninstall argocd --namespace argocd
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  when: argocd_release_status.stdout in ["failed", "pending-install", "pending-upgrade"]

- name: argocd 네임스페이스 생성
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Namespace
    metadata:
      name: argocd
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: ArgoCD Helm 배포
  command: >
    helm upgrade --install argocd argo/argo-cd
    --namespace argocd
    --create-namespace
    --set configs.params."server\.insecure"=true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  when: argocd_release_status.stdout != "deployed"

- name: ArgoCD server rollout status
  command: kubectl rollout status deployment/argocd-server --namespace argocd --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Ensure app namespaces have Linkerd injection enabled
  shell: |
    for NS in login user-app operator-app; do
      kubectl apply -f - <<NSEOF
    apiVersion: v1
    kind: Namespace
    metadata:
      name: $NS
      annotations:
        linkerd.io/inject: enabled
    NSEOF
    done
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: operator-app ArgoCD Application 생성
  shell: |
    kubectl apply --validate=false -f - <<EOF
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: operator-app
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: "{{ argocd_repo_url_resolved }}"
        targetRevision: main
        path: k8s/frontend-operator-app
        directory:
          exclude: '{*-secret.yml,*.example.yaml,operator-ingress.yml,grafana-ingress.yml}'
      destination:
        server: https://kubernetes.default.svc
        namespace: operator-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: user-app ArgoCD Application 생성
  shell: |
    kubectl apply --validate=false -f - <<EOF
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: user-app
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: "{{ argocd_repo_url_resolved }}"
        targetRevision: main
        path: k8s/frontend-user-app
        directory:
          exclude: '{*-secret.yml,*.example.yaml,user-ingress.yml}'
      destination:
        server: https://kubernetes.default.svc
        namespace: user-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: backend-login ArgoCD Application 생성
  shell: |
    kubectl apply --validate=false -f - <<EOF
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: backend-login
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: "{{ argocd_repo_url_resolved }}"
        targetRevision: main
        path: k8s/backend-login
        directory:
          exclude: '{*-secret.yml,*.example.yaml}'
      destination:
        server: https://kubernetes.default.svc
        namespace: login
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: backend-user ArgoCD Application 생성
  shell: |
    kubectl apply --validate=false -f - <<EOF
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: backend-user
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: "{{ argocd_repo_url_resolved }}"
        targetRevision: main
        path: k8s/backend-user
        directory:
          exclude: '{*-secret.yml,*.example.yaml}'
      destination:
        server: https://kubernetes.default.svc
        namespace: user-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: backend-operator ArgoCD Application 생성
  shell: |
    kubectl apply --validate=false -f - <<EOF
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: backend-operator
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: "{{ argocd_repo_url_resolved }}"
        targetRevision: main
        path: k8s/backend-operator
        directory:
          exclude: '{*-secret.yml,*.example.yaml}'
      destination:
        server: https://kubernetes.default.svc
        namespace: operator-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Restart web platform deployments to pull current images
  shell: |
    set -e
    DEPLOYMENTS="
    login backend-login
    user-app user-app
    user-app backend-user
    operator-app operator-app
    operator-app backend-operator
    "

    echo "$DEPLOYMENTS" | while read -r NAMESPACE DEPLOYMENT; do
      if [ -z "$NAMESPACE" ] || [ -z "$DEPLOYMENT" ]; then
        continue
      fi

      echo "Waiting for deployment/${DEPLOYMENT} in namespace ${NAMESPACE}"

      for ATTEMPT in $(seq 1 60); do
        if kubectl get deployment "$DEPLOYMENT" -n "$NAMESPACE" >/dev/null 2>&1; then
          kubectl rollout restart "deployment/${DEPLOYMENT}" -n "$NAMESPACE"
          kubectl rollout status "deployment/${DEPLOYMENT}" -n "$NAMESPACE" --timeout=300s
          break
        fi

        if [ "$ATTEMPT" -eq 60 ]; then
          echo "Deployment ${DEPLOYMENT} was not created in namespace ${NAMESPACE}."
          exit 1
        fi

        sleep 5
      done
    done
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
