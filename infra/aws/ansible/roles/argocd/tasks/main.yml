---
- name: ArgoCD Helm repo 추가
  command: helm repo add argo https://argoproj.github.io/argo-helm --force-update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Helm repo 업데이트
  command: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: ArgoCD 릴리즈 상태 확인
  shell: >
    helm status argocd --namespace argocd --output json 2>/dev/null
    | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])"
    2>/dev/null || echo "not-found"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  register: argocd_release_status
  failed_when: false
  changed_when: false

- name: 실패한 ArgoCD 릴리즈 제거 (재설치 위해)
  command: helm uninstall argocd --namespace argocd
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  when: argocd_release_status.stdout in ["failed", "pending-install", "pending-upgrade"]

- name: argocd 네임스페이스 생성
  shell: |
    kubectl apply -f - <<EOF
    apiVersion: v1
    kind: Namespace
    metadata:
      name: argocd
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: ArgoCD Helm 배포
  command: >
    helm upgrade --install argocd argo/argo-cd
    --namespace argocd
    --create-namespace
    --set configs.params."server\.insecure"=true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true
  when: argocd_release_status.stdout != "deployed"

- name: ArgoCD 서버 준비 완료 대기
  command: kubectl rollout status deployment/argocd-server --namespace argocd --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: Ensure app namespaces have Linkerd injection enabled
  shell: |
    for NS in login user-app operator-app; do
      kubectl apply -f - <<NSEOF
    apiVersion: v1
    kind: Namespace
    metadata:
      name: $NS
      annotations:
        linkerd.io/inject: enabled
    NSEOF
    done
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

- name: operator-app ArgoCD Application 생성
  shell: |
    kubectl apply --validate=false -f - <<EOF
    apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: operator-app
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/yjhoo98/ktcloud2nd.git
        targetRevision: main
        path: k8s/frontend-operator-app
        directory:
          exclude: '*-secret.yml'
      destination:
        server: https://kubernetes.default.svc
        namespace: operator-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
    EOF
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  run_once: true

