name: 'AWS Infrastructure Deploy'
# 배포 순서: AWS(하류) → Azure(상류) → AWS(자동 재호출)

on:
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업을 선택하세요.'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - ansible
          - destroy

permissions:
  contents: read

concurrency:
  group: deploy-infra-aws
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.8.5"
  TF_VAR_public_hosted_zone_name: ${{ vars.PUBLIC_HOSTED_ZONE_NAME || 'palja.click' }}
  TF_VAR_user_app_host: ${{ vars.USER_APP_HOST || 'app.palja.click' }}
  TF_VAR_operator_app_host: ${{ vars.OPERATOR_APP_HOST || 'admin.palja.click' }}
  TF_VAR_network_state_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
  TF_VAR_network_state_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_data_state_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
  TF_VAR_data_state_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  ARGOCD_REPO_URL: https://github.com/ktcloud2nd/ktcloud2nd.git

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'apply' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -recursive infra/aws/terraform

      - name: Prepare compute tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      # tfvars에 Secrets에 있는 RDS_PASSWORD 주입
      - name: Prepare data tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars

      - name: Prepare alerts tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars
          sed -i 's|^slack_webhook_url *=.*|slack_webhook_url = "${{ secrets.SLACK_WEBHOOK_URL }}"|' terraform.tfvars

      - name: Install notifier Lambda dependencies
        working-directory: ${{ github.workspace }}/infra/aws/lambda/slack-anomaly-notifier
        run: npm ci

      - name: Network Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Network Validate
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform validate

      - name: Network Plan
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform plan -input=false -out=tfplan

      - name: Show Network Plan
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform show -no-color tfplan

      - name: Compute Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Compute Validate
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: terraform validate

      - name: Data Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Data Validate
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: terraform validate

      - name: Check alerts data remote state
        id: alerts-data-state
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        shell: bash
        run: |
          if aws s3api head-object --bucket palja-terraform-backend --key aws/data/terraform.tfstate >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Alerts Init
        if: steps.alerts-data-state.outputs.exists == 'true'
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Alerts Validate
        if: steps.alerts-data-state.outputs.exists == 'true'
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: terraform validate

      - name: Alerts Plan
        if: steps.alerts-data-state.outputs.exists == 'true'
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: terraform plan -input=false -out=tfplan

      - name: Show Alerts Plan
        if: steps.alerts-data-state.outputs.exists == 'true'
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: terraform show -no-color tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ inputs.action == 'apply' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Prepare compute tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars

      - name: Prepare alerts tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars
          sed -i 's|^slack_webhook_url *=.*|slack_webhook_url = "${{ secrets.SLACK_WEBHOOK_URL }}"|' terraform.tfvars

      - name: Install notifier Lambda dependencies
        working-directory: ${{ github.workspace }}/infra/aws/lambda/slack-anomaly-notifier
        run: npm ci

      - name: Network Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Network Apply
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform apply -input=false -auto-approve

      - name: Compute Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Compute Apply
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: terraform apply -input=false -auto-approve

      - name: Data Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Import data S3 bucket when it already exists
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: |
          NAME_PREFIX=$(grep '^name_prefix' terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          BUCKET_NAME="${NAME_PREFIX}-data"
          echo "Checking bucket: $BUCKET_NAME"
          if terraform state show aws_s3_bucket.data > /dev/null 2>&1; then
            echo "Bucket already exists in state, skipping import."
          elif aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket exists in AWS, importing into Terraform state."
            terraform import aws_s3_bucket.data "$BUCKET_NAME"
          else
            echo "Bucket does not exist yet, Terraform will create it."
          fi

      - name: Data Apply
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: terraform apply -input=false -auto-approve

      - name: Alerts Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Alerts Apply
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: terraform apply -input=false -auto-approve

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'destroy' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Prepare compute tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars

      - name: Prepare alerts tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars
          sed -i 's|^slack_webhook_url *=.*|slack_webhook_url = "${{ secrets.SLACK_WEBHOOK_URL }}"|' terraform.tfvars

      - name: Install notifier Lambda dependencies
        working-directory: ${{ github.workspace }}/infra/aws/lambda/slack-anomaly-notifier
        run: npm ci

      - name: Alerts Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Alerts Refresh State
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        continue-on-error: true
        run: terraform apply -refresh-only -auto-approve -input=false

      - name: Alerts Destroy
        working-directory: ${{ github.workspace }}/infra/aws/terraform/alerts
        run: terraform destroy -input=false -auto-approve

      - name: Data Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Data Refresh State
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        continue-on-error: true
        run: |
          terraform apply -refresh-only -auto-approve -input=false

      - name: Data Destroy
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: |
          terraform destroy -input=false -auto-approve \
            -target=aws_db_instance.postgresql \
            -target=aws_db_subnet_group.postgresql \
            -target=aws_route53_record.db_endpoint
      
      - name: Compute Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Compute Refresh State
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        continue-on-error: true
        run: terraform apply -refresh-only -auto-approve -input=false

      - name: Compute Destroy
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: terraform destroy -input=false -auto-approve

      - name: Network Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Network Refresh State
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        continue-on-error: true
        run: terraform apply -refresh-only -auto-approve -input=false

      - name: Network Destroy
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: |
          # VPC 본체를 제외한 나머지 삭제 (Route 53랑 VPC가 연결되어 있음)
          terraform destroy -input=false -auto-approve \
            -target=aws_route53_record.user_app_alias \
            -target=aws_route53_record.operator_app_alias \
            -target=aws_security_group.db \
            -target=aws_security_group.k3s_nodes \
            -target=aws_security_group.alb \
            -target=aws_nat_gateway.this \
            -target=aws_eip.nat \
            -target=aws_lb.public \
            -target=aws_lb_target_group.worker_http \
            -target=aws_internet_gateway.this \
            -target=aws_subnet.public \
            -target=aws_subnet.private_app \
            -target=aws_subnet.private_db \
            -target=aws_route_table.public \
            -target=aws_route_table.private_app \
            -target=aws_route_table.private_db \
            -target=aws_vpc_endpoint.s3

  prepare-ansible-inventory:
    name: Prepare Ansible Inventory
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: ${{ always() && contains(fromJSON('["apply","ansible"]'), inputs.action) && (inputs.action == 'ansible' || needs.terraform-apply.result == 'success') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Prepare compute tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars

      - name: Compute Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Data Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_ACCESS_KEY_ID }}"
          -backend-config="secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Generate Ansible inventory hosts.ini
        shell: bash
        run: |
          MASTER_A_ID=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_a_instance_id)
          MASTER_C_ID=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_c_instance_id)
          MASTER_A_IP=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_a_private_ip)
          MASTER_C_IP=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_c_private_ip)
          NLB_DNS=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw k3s_nlb_dns)
          DB_ENDPOINT=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_endpoint)
          DB_PORT=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_port)
          DB_NAME=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_name)
          DB_USERNAME=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_username)
          CLUSTER_NAME=$(grep '^cluster_name' ${{ github.workspace }}/infra/aws/terraform/compute/terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')

          mkdir -p ${{ github.workspace }}/infra/aws/ansible/inventory
          INV=${{ github.workspace }}/infra/aws/ansible/inventory/hosts.ini

          printf '[all:vars]\n' > "$INV"
          printf 'ansible_user=ubuntu\n' >> "$INV"
          printf 'ansible_ssh_private_key_file=~/.ssh/infra.pem\n' >> "$INV"
          printf 'ansible_ssh_common_args='"'"'-o StrictHostKeyChecking=no -o ProxyCommand="aws ssm start-session --target %%h --document-name AWS-StartSSHSession --parameters portNumber=%%p"'"'"'\n' >> "$INV"
          printf 'cluster_name=%s\n' "$CLUSTER_NAME" >> "$INV"
          printf 'aws_region=%s\n' "$AWS_REGION" >> "$INV"
          printf 'nlb_dns=%s\n' "$NLB_DNS" >> "$INV"
          printf 'db_endpoint=%s\n' "$DB_ENDPOINT" >> "$INV"
          printf 'db_port=%s\n' "$DB_PORT" >> "$INV"
          printf 'db_name=%s\n' "$DB_NAME" >> "$INV"
          printf 'db_username=%s\n' "$DB_USERNAME" >> "$INV"
          printf 'argocd_repo_url=%s\n' "$ARGOCD_REPO_URL" >> "$INV"
          printf '\n[masters]\n' >> "$INV"
          printf 'master_a ansible_host=%s private_ip=%s\n' "$MASTER_A_ID" "$MASTER_A_IP" >> "$INV"
          printf 'master_c ansible_host=%s private_ip=%s\n' "$MASTER_C_ID" "$MASTER_C_IP" >> "$INV"
          printf '\n[k8s_cluster:children]\nmasters\n' >> "$INV"

          echo "Generated hosts.ini:"
          cat "$INV"

      - name: Upload Ansible inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-inventory
          path: infra/aws/ansible/inventory/hosts.ini
          if-no-files-found: error

  ansible-k3s-setup:
    name: Ansible Playbook
    runs-on: ubuntu-latest
    needs: prepare-ansible-inventory
    if: ${{ always() && contains(fromJSON('["apply","ansible"]'), inputs.action) && needs.prepare-ansible-inventory.result == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SSM Session Manager plugin
        run: curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o session-manager-plugin.deb && sudo dpkg -i session-manager-plugin.deb

      - name: Install Ansible
        run: pip install ansible boto3

      - name: Download Ansible inventory
        uses: actions/download-artifact@v4
        with:
          name: ansible-inventory
          path: infra/aws/ansible/inventory/

      - name: Configure EC2 SSH key
        run: mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/infra.pem && chmod 600 ~/.ssh/infra.pem

      - name: Write Vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > infra/aws/ansible/vault/vault_pass && chmod 600 infra/aws/ansible/vault/vault_pass

      - name: Wait for EC2 instances to be reachable through SSM
        shell: bash
        run: |
          MASTER_A=$(grep 'master_a' infra/aws/ansible/inventory/hosts.ini | grep -oP 'ansible_host=\K[^\s]+')
          MASTER_C=$(grep 'master_c' infra/aws/ansible/inventory/hosts.ini | grep -oP 'ansible_host=\K[^\s]+')

          echo "Checking SSM status for: $MASTER_A $MASTER_C"

          for i in $(seq 1 18); do
            COUNT=$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=${MASTER_A},${MASTER_C}" --query 'InstanceInformationList[?PingStatus==`Online`]' --output json | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
            echo "SSM online instances: $COUNT / 2"
            if [ "$COUNT" -ge 2 ]; then
              exit 0
            fi
            sleep 10
          done

          echo "SSM instances did not become ready in time."
          exit 1

      - name: Smoke test SSM SSH connectivity
        shell: bash
        run: |
          for HOST in master_a master_c; do
            TARGET=$(grep "^${HOST} " infra/aws/ansible/inventory/hosts.ini | grep -oP 'ansible_host=\K[^\s]+')
            echo "Testing SSH over SSM for ${HOST} (${TARGET})"
            ssh -vvv \
              -i ~/.ssh/infra.pem \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ProxyCommand='aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p' \
              ubuntu@"${TARGET}" 'echo ssm-ssh-ok'
          done
      
      - name: Run Ansible Playbook
        working-directory: infra/aws/ansible
        env:
          DB_PASS: ${{ secrets.RDS_PASSWORD }}
          QUICKSIGHT_AWS_ACCOUNT_ID: ${{ secrets.QUICKSIGHT_AWS_ACCOUNT_ID }}
          QUICKSIGHT_REGISTERED_USER_ARN: ${{ secrets.QUICKSIGHT_REGISTERED_USER_ARN }}
          QUICKSIGHT_ANOMALY_REGISTERED_USER_ARN: ${{ secrets.QUICKSIGHT_ANOMALY_REGISTERED_USER_ARN }}
          QUICKSIGHT_VEHICLE_REGISTERED_USER_ARN: ${{ secrets.QUICKSIGHT_VEHICLE_REGISTERED_USER_ARN }}
          QUICKSIGHT_ANOMALY_DASHBOARD_ID: ${{ secrets.QUICKSIGHT_ANOMALY_DASHBOARD_ID }}
          QUICKSIGHT_VEHICLE_DASHBOARD_ID: ${{ secrets.QUICKSIGHT_VEHICLE_DASHBOARD_ID }}
          QUICKSIGHT_ALLOWED_DOMAINS: ${{ vars.QUICKSIGHT_ALLOWED_DOMAINS }}
          QUICKSIGHT_SESSION_LIFETIME_MINUTES: ${{ vars.QUICKSIGHT_SESSION_LIFETIME_MINUTES }}
          QUICKSIGHT_NAMESPACE: ${{ vars.QUICKSIGHT_NAMESPACE }}
          GRAFANA_EMBED_URL: ${{ vars.GRAFANA_EMBED_URL }}
          OPERATOR_APP_HOST: ${{ vars.OPERATOR_APP_HOST || 'admin.palja.click' }}
        run: |
          ansible-playbook -i inventory/hosts.ini \
            --vault-password-file vault/vault_pass \
            -e "db_password=$DB_PASS" \
            -e "quicksight_aws_account_id=$QUICKSIGHT_AWS_ACCOUNT_ID" \
            -e "quicksight_registered_user_arn=$QUICKSIGHT_REGISTERED_USER_ARN" \
            -e "quicksight_anomaly_registered_user_arn=$QUICKSIGHT_ANOMALY_REGISTERED_USER_ARN" \
            -e "quicksight_vehicle_registered_user_arn=$QUICKSIGHT_VEHICLE_REGISTERED_USER_ARN" \
            -e "quicksight_anomaly_dashboard_id=$QUICKSIGHT_ANOMALY_DASHBOARD_ID" \
            -e "quicksight_vehicle_dashboard_id=$QUICKSIGHT_VEHICLE_DASHBOARD_ID" \
            -e "quicksight_allowed_domains=$QUICKSIGHT_ALLOWED_DOMAINS" \
            -e "quicksight_session_lifetime_minutes=$QUICKSIGHT_SESSION_LIFETIME_MINUTES" \
            -e "quicksight_namespace=$QUICKSIGHT_NAMESPACE" \
            -e "grafana_embed_url=$GRAFANA_EMBED_URL" \
            -e "operator_app_host=$OPERATOR_APP_HOST" \
            playbooks/setup_k3s_cluster.yml
