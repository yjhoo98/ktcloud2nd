name: 'Azure Infrastructure Deploy'

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'мӢӨн–үн•  мһ‘м—…мқ„ м„ нғқн•ҳм„ёмҡ”.' # apply: мғқм„ұ / destroy: мӮӯм ң
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy

env:
  # Azureм—җ лЎңк·ёмқён•ҳкё° мң„н•ң мқёмҰқ м •ліҙ
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  # variables.tfлЎң л°Җм–ҙ л„Јмқ„ л№„л°Җ м •ліҙ
  TF_VAR_public_key: ${{ secrets.AZURE_PUBLIC_KEY }}
  TF_VAR_onprem_ip: ${{ secrets.ONPREM_SOURCE_IP }}

jobs:
  build-image:
    name: 'Build and Push Docker Image'
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'apply' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Kafka Connect мқҙлҜём§Җ л№Ңл“ң
      - name: Build and Push Kafka Connect Image
        uses: docker/build-push-action@v4
        with:
          context: ./infra/azure/ansible/roles/kafka-consumer/templates
          file: ./infra/azure/ansible/roles/kafka-consumer/templates/Dockerfile.j2
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-kafka-connect:latest

      # мҳЁн”„л ҲлҜёмҠӨ мӢңл®¬л Ҳмқҙн„° мқҙлҜём§Җ л№Ңл“ң
      - name: Build and Push Edge Simulator Image
        uses: docker/build-push-action@v4
        with:
          context: ./infra/edge
          file: ./infra/edge/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vehicle-simulator:latest

  terraform-azure:
    name: 'Terraform Azure'
    needs: build-image # л№Ңл“ңк°Җ м„ұкіөн•ҙм•ј л°°нҸ¬ мӢңмһ‘
    if: |
      always() &&
      (github.event.inputs.action == 'destroy' || 
      (github.event.inputs.action == 'apply' && needs.build-image.result == 'success'))
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/azure/terraform

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # AWS мқёмҰқ м •ліҙ м„Өм • (SSMм—җм„ң л№„лІҲмқ„ мқҪм–ҙмҳӨкё° мң„н•ҙ л°ҳл“ңмӢң н•„мҡ”)
    # S3 Backand мқҪм–ҙм•ј н•Ё
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_wrapper: false

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      if: ${{ github.event.inputs.action == 'apply' }}
      run: terraform apply -auto-approve

    - name: Terraform Destroy
      if: ${{ github.event.inputs.action == 'destroy' }}
      run: terraform destroy -auto-approve

    # ----- Apply м„ұкіө мӢң мӢӨн–үлҗҳлҠ” нӣ„мҶҚ мһ‘м—…л“Ө -----

    # мҠӨнҶ лҰ¬м§Җ м •ліҙ м¶”м¶ң (jq мӮ¬мҡ©)
    - name: Get Storage Info from Terraform
      if: ${{ github.event.inputs.action == 'apply' }}
      run: |
        STORAGE_NAME=$(terraform output -json azure_storage_account_name | jq -r .)
        STORAGE_KEY=$(terraform output -json azure_storage_primary_key | jq -r .)
        echo "AZURE_STORAGE_NAME=${STORAGE_NAME}" >> $GITHUB_ENV
        echo "AZURE_STORAGE_KEY=${STORAGE_KEY}" >> $GITHUB_ENV

    # SSH к°ңмқё нӮӨ м„Өм • (Ansible м ‘мҶҚмҡ©)
    - name: Set up SSH Key
      if: ${{ github.event.inputs.action == 'apply' }}
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.AZURE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    # SSH м„ңл№„мҠӨ мӨҖл№„ кё°лӢӨлҰј
    - name: Wait for SSH service to boot
      if: ${{ github.event.inputs.action == 'apply' }}
      run: sleep 30

    # Inventory мғқм„ұ
    - name: Generate Ansible Inventory
      if: ${{ github.event.inputs.action == 'apply' }}
      run: |
        BASTION_IP=$(terraform output -json bastion_public_ip | jq -r .)
        BROKER_IP=$(terraform output -json broker_public_ip | jq -r .)
        CONSUMER_PRIV_IP=$(terraform output -json consumer_private_ip | jq -r .)
        VM_USER=$(terraform output -json admin_username | jq -r .)

        echo "Generating inventory with Bastion($BASTION_IP), Broker($BROKER_IP), Consumer($CONSUMER_PRIV_IP)"

        cat <<EOF > azure_hosts.ini
        [bastion]
        bastion-host ansible_host=${BASTION_IP}

        [azure_broker]
        broker-vm ansible_host=${BROKER_IP}

        [azure_consumer]
        consumer-vm ansible_host=${CONSUMER_PRIV_IP}

        [azure_vms:children]
        azure_broker
        azure_consumer

        [azure_vms:vars]
        ansible_user=${VM_USER}
        ansible_ssh_private_key_file=~/.ssh/id_rsa
        ansible_ssh_common_args='-o StrictHostKeyChecking=no'

        [azure_consumer:vars]
        ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="ssh -W %h:%p -q ${VM_USER}@${BASTION_IP} -o StrictHostKeyChecking=no"'
        EOF

    # AWSмҷҖ нҶөмӢ н•ҳкё° мң„н•ң н•„мҲҳ лқјмқҙлёҢлҹ¬лҰ¬ м„Өм№ҳ (м•Өм„ңлё” м „мҡ© нҷҳкІҪм—җ мЈјмһ…)
    - name: Install dependencies for Ansible AWS lookup
      if: ${{ github.event.inputs.action == 'apply' }}
      run: |
        # м•Өм„ңлё”мқҙ мӮ¬мҡ©н•ҳлҠ” к°ҖмғҒнҷҳкІҪ м•Ҳм—җ boto3мҷҖ botocoreлҘј к°•м ңлЎң мЈјмһ…
        pipx inject ansible-core boto3 botocore
        
        # м•Өм„ңлё” м»¬л үм…ҳ м„Өм№ҳ
        ansible-galaxy collection install amazon.aws community.general

    # Ansible мӢӨн–ү
    - name: Run Ansible Playbook
      if: ${{ github.event.inputs.action == 'apply' }}
      env:
        # AWS мһҗкІ© мҰқлӘ…мқ„ мӢӨн–ү мӢңм җм—җ лӘ…мӢңм ҒмңјлЎң лӢӨмӢң мЈјмһ…
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      run: |
        BROKER_IP=$(terraform output -json broker_public_ip | jq -r .)
        BROKER_PRIV_IP=$(terraform output -json broker_private_ip | jq -r .)
 
        if [ ! -f "../ansible/roles/kafka-consumer/files/processor.py" ]; then
          echo "Error: processor.py missing in roles/kafka-consumer/files/"
          exit 1
        fi

        ansible-playbook -i azure_hosts.ini ../ansible/playbook.yml \
          -e "aws_region=${{ vars.AWS_REGION }}" \
          -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" \
          -e "broker_public_ip=${BROKER_IP}" \
          -e "broker_internal_ip=${BROKER_PRIV_IP}" \
          -e "azure_storage_account_name=${{ env.AZURE_STORAGE_NAME }}" \
          -e "azure_storage_primary_key=${{ env.AZURE_STORAGE_KEY }}" \
          -e "db_name=vehicle_db" \
          -e "db_user=dbadmin"