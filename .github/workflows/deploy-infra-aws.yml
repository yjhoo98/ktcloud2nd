name: deploy-infra-aws

on:
  push:
    branches:
      - main
      - aws-cicd
    paths:
      - 'infra/terraform/aws/**'
      - '.github/workflows/deploy-infra-aws.yml'

  pull_request:
    paths:
      - 'infra/terraform/aws/**'
      - '.github/workflows/deploy-infra-aws.yml'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-infra-aws
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: '1.8.5'
  TF_VAR_network_state_path: ../network/terraform.tfstate

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform/aws

      - name: Prepare compute tfvars from example
        working-directory: infra/terraform/aws/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: infra/terraform/aws/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars

      # NETWORK
      - name: Network Init
        working-directory: infra/terraform/aws/network
        run: terraform init -input=false

      - name: Network Validate
        working-directory: infra/terraform/aws/network
        run: terraform validate

      - name: Network Plan
        working-directory: infra/terraform/aws/network
        run: terraform plan -input=false -out=tfplan

      - name: Show Network Plan
        working-directory: infra/terraform/aws/network
        run: terraform show -no-color tfplan

      # COMPUTE
      - name: Compute Init
        working-directory: infra/terraform/aws/compute
        run: terraform init -input=false

      - name: Compute Validate
        working-directory: infra/terraform/aws/compute
        run: terraform validate

      # DATA
      - name: Data Init
        working-directory: infra/terraform/aws/data
        run: terraform init -input=false

      - name: Data Validate
        working-directory: infra/terraform/aws/data
        run: terraform validate

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Prepare compute tfvars from example
        working-directory: infra/terraform/aws/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: infra/terraform/aws/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars

      # NETWORK APPLY
      - name: Network Init
        working-directory: infra/terraform/aws/network
        run: terraform init -input=false

      - name: Network Apply
        working-directory: infra/terraform/aws/network
        run: terraform apply -input=false -auto-approve

      # COMPUTE APPLY
      - name: Compute Init
        working-directory: infra/terraform/aws/compute
        run: terraform init -input=false

      - name: Compute Apply
        working-directory: infra/terraform/aws/compute
        run: terraform apply -input=false -auto-approve

      # DATA APPLY
      - name: Data Init
        working-directory: infra/terraform/aws/data
        run: terraform init -input=false

      - name: Data Apply
        working-directory: infra/terraform/aws/data
        run: terraform apply -input=false -auto-approve