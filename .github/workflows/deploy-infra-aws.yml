name: deploy-infra-aws

on:
  workflow_dispatch:
    inputs:
      action:
        description: "실행할 작업을 선택하세요."
        required: true
        type: choice
        options:
          - apply
          - destroy

permissions:
  contents: read

concurrency:
  group: deploy-infra-aws
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.8.5"
  TF_VAR_network_state_access_key: ${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}
  TF_VAR_network_state_secret_key: ${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}


jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'apply' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/aws/terraform

      - name: Prepare compute tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars

      - name: Network Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Network Validate
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform validate

      - name: Network Plan
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform plan -input=false -out=tfplan

      - name: Show Network Plan
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform show -no-color tfplan

      - name: Compute Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Compute Validate
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: terraform validate

      - name: Data Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Data Validate
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: terraform validate

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: ${{ inputs.action == 'apply' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Prepare compute tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars

      - name: Network Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Network Apply
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform apply -input=false -auto-approve

      - name: Compute Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Compute Apply
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: terraform apply -input=false -auto-approve

      - name: Data Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Data S3 버킷 import (state에 없고 AWS에 이미 존재할 때만 실행)
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: |
          NAME_PREFIX=$(grep '^name_prefix' terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          BUCKET_NAME="${NAME_PREFIX}-data"
          echo "대상 버킷: $BUCKET_NAME"
          if terraform state show aws_s3_bucket.this > /dev/null 2>&1; then
            echo "이미 state에 존재 - import 생략"
          elif aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "AWS에 버킷 존재 - import 실행"
            terraform import aws_s3_bucket.this "$BUCKET_NAME"
          else
            echo "버킷 미존재 - terraform apply에서 신규 생성"
          fi

      - name: Data Apply
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: terraform apply -input=false -auto-approve

      - name: Ansible 인벤토리 hosts.ini 생성
        run: |
          MASTER_A_ID=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_a_instance_id)
          MASTER_C_ID=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_c_instance_id)
          MASTER_A_IP=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_a_private_ip)
          MASTER_C_IP=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw master_c_private_ip)
          NLB_DNS=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/compute output -raw k3s_nlb_dns)
          DB_ENDPOINT=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_endpoint)
          DB_PORT=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_port)
          DB_NAME=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_name)
          DB_USERNAME=$(terraform -chdir=${{ github.workspace }}/infra/aws/terraform/data output -raw db_username)
          CLUSTER_NAME=$(grep '^cluster_name' ${{ github.workspace }}/infra/aws/terraform/compute/terraform.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          mkdir -p ${{ github.workspace }}/infra/aws/ansible/inventory
          INV=${{ github.workspace }}/infra/aws/ansible/inventory/hosts.ini
          printf '[all:vars]\n' > "$INV"
          printf 'ansible_user=ubuntu\n' >> "$INV"
          printf 'ansible_ssh_private_key_file=~/.ssh/infra.pem\n' >> "$INV"
          printf 'ansible_ssh_common_args='"'"'-o StrictHostKeyChecking=no -o ProxyCommand="aws ssm start-session --target %%h --document-name AWS-StartSSHSession --parameters portNumber=%%p"'"'"'\n' >> "$INV"
          printf 'cluster_name=%s\n' "$CLUSTER_NAME" >> "$INV"
          printf 'aws_region=%s\n' "$AWS_REGION" >> "$INV"
          printf 'nlb_dns=%s\n' "$NLB_DNS" >> "$INV"
          printf 'db_endpoint=%s\n' "$DB_ENDPOINT" >> "$INV"
          printf 'db_port=%s\n' "$DB_PORT" >> "$INV"
          printf 'db_name=%s\n' "$DB_NAME" >> "$INV"
          printf 'db_username=%s\n' "$DB_USERNAME" >> "$INV"
          printf '\n[masters]\n' >> "$INV"
          printf 'master_a ansible_host=%s private_ip=%s\n' "$MASTER_A_ID" "$MASTER_A_IP" >> "$INV"
          printf 'master_c ansible_host=%s private_ip=%s\n' "$MASTER_C_ID" "$MASTER_C_IP" >> "$INV"
          printf '\n[k8s_cluster:children]\nmasters\n' >> "$INV"
          echo "hosts.ini 생성 완료:" && cat "$INV"

      - name: Ansible 인벤토리 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ansible-inventory
          path: infra/aws/ansible/inventory/hosts.ini
          if-no-files-found: error

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'destroy' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Prepare compute tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^k3s_shared_token *=.*|k3s_shared_token = "${{ secrets.K3S_TOKEN }}"|' terraform.tfvars

      - name: Prepare data tfvars from example
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        shell: bash
        run: |
          cp terraform.tfvars.example terraform.tfvars
          sed -i 's|^db_password *=.*|db_password = "${{ secrets.RDS_PASSWORD }}"|' terraform.tfvars

      - name: Compute Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Compute Destroy
        working-directory: ${{ github.workspace }}/infra/aws/terraform/compute
        run: terraform destroy -input=false -auto-approve

      - name: Data Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Data Destroy
        working-directory: ${{ github.workspace }}/infra/aws/terraform/data
        run: terraform destroy -input=false -auto-approve

      - name: Network Init
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: >-
          terraform init -input=false -reconfigure
          -backend-config="access_key=${{ secrets.AWS_TFSTATE_S3_ACCESS_KEY }}"
          -backend-config="secret_key=${{ secrets.AWS_TFSTATE_S3_SECRET_ACCESS_KEY }}"

      - name: Network Destroy
        working-directory: ${{ github.workspace }}/infra/aws/terraform/network
        run: terraform destroy -input=false -auto-approve

  ansible-k3s-setup:
    name: Ansible K3s Cluster Setup
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: ${{ inputs.action == 'apply' }}

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SSM Session Manager 플러그인 설치
        run: curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o session-manager-plugin.deb && sudo dpkg -i session-manager-plugin.deb

      - name: Ansible 설치
        run: pip install ansible boto3

      - name: Ansible 인벤토리 다운로드
        uses: actions/download-artifact@v4
        with:
          name: ansible-inventory
          path: infra/aws/ansible/inventory/

      - name: EC2 SSH 키 설정
        run: mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/infra.pem && chmod 600 ~/.ssh/infra.pem

      - name: Vault 비밀번호 파일 생성
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > infra/aws/ansible/vault/vault_pass && chmod 600 infra/aws/ansible/vault/vault_pass

      - name: EC2 SSM 등록 대기 (최대 3분)
        run: |
          MASTER_A=$(grep 'master_a' infra/aws/ansible/inventory/hosts.ini | grep -oP 'ansible_host=\K[^\s]+')
          MASTER_C=$(grep 'master_c' infra/aws/ansible/inventory/hosts.ini | grep -oP 'ansible_host=\K[^\s]+')
          echo "대기 대상 인스턴스: $MASTER_A $MASTER_C"
          for i in $(seq 1 18); do
            COUNT=$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=${MASTER_A},${MASTER_C}" --query 'InstanceInformationList[?PingStatus==`Online`]' --output json | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
            echo "SSM 온라인 인스턴스: $COUNT / 2"
            if [ "$COUNT" -ge 2 ]; then exit 0; fi
            sleep 10
          done
          echo "SSM 등록 타임아웃" && exit 1

      - name: Ansible Playbook 실행 (K3s + Linkerd + Grafana)
        working-directory: infra/aws/ansible
        run: ansible-playbook -i inventory/hosts.ini --vault-password-file vault/vault_pass playbooks/setup_k3s_cluster.yml
