apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-backend
  namespace: user-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-backend
  template:
    metadata:
      labels:
        app: web-backend
    spec:
      tolerations:
        - key: nodetype
          operator: Equal
          value: user
          effect: NoSchedule
      nodeSelector:
        role: user-worker
      containers:
        - name: web-backend
          image: PLACEHOLDER_BACKEND_IMAGE  # Docker Hub 이미지 주소로 교체 (예: username/user-backend:latest)
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web-backend
  namespace: user-app
spec:
  selector:
    app: web-backend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
