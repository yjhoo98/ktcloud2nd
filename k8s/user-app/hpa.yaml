apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-app-hpa
  namespace: user-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
