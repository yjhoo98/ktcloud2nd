# Middleware 매니페스트
# 운영자용이므로 민감 경로 차단 규칙을 좀 더 엄격하게 둠
# 안정화되면 SecRuleEngine DetectionOnly -> SecRuleEngine On

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: coraza-waf
  namespace: operator-app
spec:
  plugin:
    coraza:
      directives:
        - SecRuleEngine DetectionOnly
        - SecRequestBodyAccess On
        - SecResponseBodyAccess Off
        - SecAuditEngine RelevantOnly
        - SecAuditLog /dev/stdout
        - SecAuditLogFormat JSON
        - SecRule REQUEST_METHOD "!@within GET HEAD POST OPTIONS" "id:200001,phase:1,log,deny,status:405,msg:'disallowed method'"
        - SecRule REQUEST_URI "@rx (?i)(/debug|/actuator|/internal)" "id:200002,phase:1,log,deny,status:403,msg:'restricted operator path'"
