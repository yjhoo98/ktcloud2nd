# 배포 전 실제 값으로 교체 후 적용: kubectl apply -f secret.yml
# 값은 base64 인코딩 필요: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: operator-secret
  namespace: operator-app
type: Opaque
data:
  OP_USERNAME: PLACEHOLDER_BASE64       # echo -n 'admin' | base64
  OP_PASSWORD: PLACEHOLDER_BASE64       # echo -n 'yourpassword' | base64
  JWT_SECRET: PLACEHOLDER_BASE64        # echo -n 'your-jwt-secret' | base64
